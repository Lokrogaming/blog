<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Neuigkeiten, Events und Einblicke von Lokro.">
  <title>Blogs · Lokro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="aurora" aria-hidden="true"><i></i><i></i><i></i></div>
  <header class="site-header shell glass">
    <a class="brand" href="index.html" aria-label="Lokro Blogs Startseite"><span class="brand-mark">L</span><span><b>Blogs</b><small>LOKRO</small></span></a>
    <nav><a href="#beitraege">Beiträge</a><a class="button compact" href="https://lgg.lovable.app/s/lokrogang" target="_blank" rel="noreferrer">Discord</a></nav>
  </header>
  <main class="shell">
    <section class="hero glass">
      <p class="eyebrow">LOKRO · NEWS & COMMUNITY</p>
      <h1>Alles, was bei <span>Lokro</span> passiert.</h1>
      <p class="lead">Ankündigungen, Community-Events und Einblicke an einem Ort.</p>
      <div class="hero-actions"><a class="button" href="#beitraege">Beiträge entdecken</a></div>
    </section>
    <section class="controls" aria-label="Beiträge filtern">
      <label class="search"><span>⌕</span><input id="search" type="search" placeholder="Beiträge durchsuchen …" autocomplete="off"></label>
      <select id="categoryFilter" aria-label="Kategorie auswählen"><option value="">Alle Kategorien</option></select>
      <div id="tagFilters" class="tag-filters" aria-label="Tags filtern"></div>
    </section>
    <section id="beitraege" class="posts-section">
      <div class="section-heading"><div><p class="eyebrow">AKTUELL</p><h2>Neueste Beiträge</h2></div><p id="postCount" class="muted"></p></div>
      <div id="posts" class="post-grid" aria-live="polite"><p class="loading">Beiträge werden geladen …</p></div>
    </section>
  </main>
  <footer class="shell footer">© <span id="year"></span> Lokro</footer>
  <script type="module" src="js/router.js"></script>
</body>
</html>
